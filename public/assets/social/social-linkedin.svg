<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A66C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004182;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="96" height="96" fill="url(#bg)"/>
  <!-- LinkedIn logo mark - top right, subtle -->
  <rect x="58" y="10" width="26" height="26" rx="4" fill="white" opacity="0.15"/>
  <text x="71" y="28" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white" opacity="0.9">in</text>
</svg>
